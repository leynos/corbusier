name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      PG_EMBEDDED_WORKER: /home/runner/.cargo/bin/pg_worker
      OPENSSL_NO_VENDOR: "1"
      WHITAKER_INSTALLER_VERSION: '0.2.1'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.9
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@aebb3f5b831102e2a10ef909c83d7d50ea86c332
      - name: Install frontend dependencies and browser
        run: FRONTEND_INSTALL_FLAGS=--frozen-lockfile make frontend-install
      - name: Refresh apt package index
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get update
      - name: Install OpenSSL headers for CI verification
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get install -y --no-install-recommends libssl-dev pkg-config
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Install cargo-audit
        run: cargo binstall --no-confirm cargo-audit
      - name: Audit dependencies
        run: make audit
      - name: Frontend lint
        run: make frontend-lint
      - name: Frontend typecheck
        run: make frontend-typecheck
      - name: Frontend tests
        run: make frontend-test
      - name: Frontend accessibility tests
        run: make frontend-test-a11y
      - name: Frontend localizability lint
        run: make frontend-localizability
      - name: Frontend semantic lint
        run: make frontend-semantic
      - name: Frontend e2e
        run: make frontend-e2e
      - name: Cache Whitaker installer
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
            ~/.local/share/whitaker
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        run: |
          if command -v whitaker-installer >/dev/null 2>&1; then
            echo "whitaker-installer already present; skipping cargo binstall"
          else
            cargo binstall --no-confirm whitaker-installer@${{ env.WHITAKER_INSTALLER_VERSION }}
          fi
          whitaker-installer
      - name: Lint
        run: make lint
      - name: Cache pg_worker binary
        id: cache-pg-worker
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.cargo/bin/pg_worker
          key: pg-worker-0.4.0-${{ runner.os }}
      - name: Cache PostgreSQL binaries
        id: cache-pg-binaries
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cache/postgresql_embedded
            ~/.local/share/postgresql_embedded
          key: pg-binaries-${{ hashFiles('Cargo.lock') }}-${{ runner.os }}
          restore-keys: |
            pg-binaries-${{ runner.os }}-
      - name: Install PostgreSQL test dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get install -y --no-install-recommends tzdata
          if [ ! -f ~/.cargo/bin/pg_worker ]; then
            cargo install pg-embed-setup-unpriv@0.4.0 --locked
          fi
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@aebb3f5b831102e2a10ef909c83d7d50ea86c332
        with:
          output-path: lcov.info
          format: lcov
      - name: Upload coverage data to CodeScene
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: ${{ env.CS_ACCESS_TOKEN }}
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@aebb3f5b831102e2a10ef909c83d7d50ea86c332
        with:
          format: lcov
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
