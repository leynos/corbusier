name: Coverage (main)

# CodeScene accepts `cs-coverage upload` only for analysed branches, so
# main-branch coverage is uploaded here on push; the `mode: check`
# changed-line gate lives in ci.yml's pull-request coverage job and
# runs against project 76629 now that CodeScene has enabled its
# coverage-gates configuration. This workflow also advances the
# coverage ratchet baseline: caches saved on main are readable by every
# pull-request run, so the baseline written here is the one PR ratchet
# checks compare against.
#
# `workflow_dispatch` lets the upload be re-run on demand: merges
# performed by the automerge workflow's GITHUB_TOKEN do not fire
# push-event workflows, so automerged changes to main only get
# coverage via manual dispatch.

'on':
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  coverage-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      PG_EMBEDDED_WORKER: /home/runner/.cargo/bin/pg_worker
      OPENSSL_NO_VENDOR: "1"
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN || '' }}
      CODESCENE_CLI_SHA256: ${{ vars.CODESCENE_CLI_SHA256 || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57
      - name: Refresh apt package index
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get update
      - name: Install OpenSSL headers for CI verification
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get install -y --no-install-recommends libssl-dev pkg-config
      - name: Cache pg_worker binary
        id: cache-pg-worker
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.cargo/bin/pg_worker
          key: pg-worker-0.4.0-${{ runner.os }}
      - name: Cache PostgreSQL binaries
        id: cache-pg-binaries
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cache/postgresql_embedded
            ~/.local/share/postgresql_embedded
          key: pg-binaries-${{ hashFiles('Cargo.lock') }}-${{ runner.os }}
          restore-keys: |
            pg-binaries-${{ runner.os }}-
      - name: Install PostgreSQL test dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get install -y --no-install-recommends tzdata
          if [ ! -f ~/.cargo/bin/pg_worker ]; then
            cargo install pg-embed-setup-unpriv@0.4.0 --locked
          fi
      - name: Generate coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          output-path: lcov.info
          format: lcov
          with-ratchet: 'true'
      - name: Upload coverage data to CodeScene
        if: env.CS_ACCESS_TOKEN
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          format: lcov
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ env.CODESCENE_CLI_SHA256 }}
