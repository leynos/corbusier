# Corbusier Helm chart values
# See docs/local-k8s-preview-design.md for full documentation.

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/acme/corbusier
  tag: ""
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

pdb:
  enabled: true
  minAvailable: 0

service:
  type: ClusterIP
  portName: http
  port: 8080
  targetPort: http
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Non-secret configuration. Keys become environment variables via a ConfigMap.
config:
  CORBUSIER_ENV: development

# Reference an externally managed Secret; map environment variables to keys.
existingSecretName: ""
allowMissingSecret: true
secretEnvFromKeys: {}

externalSecret:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: ""
    kind: ClusterSecretStore
  targetName: ""
  data: []

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

container:
  livenessProbe:
    httpGet:
      path: /health/live
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health/ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /health/ready
      port: http
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 12

serviceAccount:
  create: true
  name: ""
  annotations: {}

affinity: {}
