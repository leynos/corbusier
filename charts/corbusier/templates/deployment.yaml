apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "corbusier.fullname" . }}
  labels:
    {{- include "corbusier.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "corbusier.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "corbusier.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: {{ .Chart.Name }}
      {{- if .Values.config }}
      annotations:
        checksum/config: {{ toYaml .Values.config | sha256sum }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "corbusier.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30
      {{- with .Values.podSecurityContext }}
      securityContext:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- $topologySpread := .Values.topologySpread | default dict }}
      {{- $topologySpreadEnabled := $topologySpread.enabled | default true }}
      {{- $hostnamePolicy := $topologySpread.hostnamePolicy | default "DoNotSchedule" }}
      {{- if $topologySpreadEnabled }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "corbusier.selectorLabels" . | nindent 14 }}
        {{- if $hostnamePolicy }}
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ $hostnamePolicy }}
          labelSelector:
            matchLabels:
              {{- include "corbusier.selectorLabels" . | nindent 14 }}
        {{- end }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          {{- $tag := .Values.image.tag | default .Chart.AppVersion }}
          image: "{{ .Values.image.repository }}:{{ $tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default (ternary "Always" "IfNotPresent" (eq $tag "latest")) }}
          ports:
            - name: {{ .Values.service.portName | default "http" }}
              containerPort: 8080
          {{- $cfg := .Values.config | default dict }}
          {{- $sec := .Values.secretEnvFromKeys | default dict }}
          {{- $esEnabled := .Values.externalSecret.enabled | default false }}
          {{- $esTarget := .Values.externalSecret.targetName }}
          {{- $name := .Values.existingSecretName | default (ternary (default (include "corbusier.fullname" $) $esTarget) "" $esEnabled) }}
          {{- include "corbusier.validateSecrets" . -}}
          {{- if or (gt (len $cfg) 0) (gt (len $sec) 0) }}
          env:
            {{- range $k, $_ := $cfg }}
            - name: {{ $k }}
              valueFrom:
                configMapKeyRef:
                  name: {{ include "corbusier.fullname" $ }}-config
                  key: {{ $k }}
            {{- end }}
            {{- range $k, $secretKey := $sec }}
            - name: {{ $k }}
              valueFrom:
                secretKeyRef:
                  name: {{ $name | quote }}
                  key: {{ $secretKey | quote }}
                  optional: {{ $.Values.allowMissingSecret | default true }}
            {{- end }}
          {{- end }}
{{- with .Values.securityContext }}
          securityContext:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.container.readinessProbe }}
          readinessProbe:
{{- toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.container.livenessProbe }}
          livenessProbe:
{{- toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.container.startupProbe }}
          startupProbe:
{{- toYaml . | nindent 12 }}
{{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
