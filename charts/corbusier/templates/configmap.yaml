{{- if .Values.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "corbusier.fullname" . }}-config
  labels:
    {{- include "corbusier.labels" . | nindent 4 }}
data:
{{- range $key := keys .Values.config | sortAlpha }}
  {{ $key }}: {{ index $.Values.config $key | toString | quote }}
{{- end }}
{{- end }}
