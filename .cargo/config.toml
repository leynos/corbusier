[profile.dev]
opt-level = 1          # default is 0; 1 shrinks a bit without killing compile times
debug = 1              # 2 is "full debuginfo"; 1 is usually enough

[env]
# Prefer the system OpenSSL install over vendored source builds. The vendored
# path is flaky in this environment and is pulled in transitively by test and
# tooling dependencies.
OPENSSL_NO_VENDOR = "1"
